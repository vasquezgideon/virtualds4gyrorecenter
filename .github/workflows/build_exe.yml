name: Build EXE
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install hidapi pyinstaller
          curl -L -o ViGEmClient.dll https://github.com/nefarius/ViGEmClient/releases/download/v1.17.333.0/ViGEmClient.dll
      - name: Build EXE
        run: pyinstaller --onefile --windowed --name GyroOffset --collect-all hid --collect-all hidapi --add-binary "ViGEmClient.dll;." gyro_offset.py
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: GyroOffset
          path: dist/GyroOffset.exe

name: Build EXE
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install hid pyinstaller
      - name: Build EXE
        run: pyinstaller --onefile --windowed --name GyroOffset --collect-all hid gyro_offset.py
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: GyroOffset
          path: dist/GyroOffset.exe

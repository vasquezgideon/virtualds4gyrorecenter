name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies (SAFE vgamepad install)
        run: |
          pip install pyinstaller
          pip install hidapi
          pip install vgamepad --only-binary=:all:

      - name: Verify imports
        run: |
          python -c "import hid; print('hid OK')"
          python -c "import vgamepad; print('vgamepad OK')"

      - name: Build EXE
        run: |
          pyinstaller ^
            --onefile ^
            --windowed ^
            --name GyroOffset ^
            --collect-all hid ^
            --collect-all hidapi ^
            --collect-all vgamepad ^
            gyro_offset.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: GyroOffset
          path: dist/GyroOffset.exe
